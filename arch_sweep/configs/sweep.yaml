# arch_sweep job matrix — consumed by run_all.py (U11).
#
# Each entry under `jobs:` is expanded into cells; any list-valued key becomes a
# cross-product (a grid). Every cell maps to one per-model script run and one
# crash-safe results/<job_id>.jsonl. Re-running skips cells whose result exists
# (resume). Defaults: variant=reference, head=mlp_bn, tuning_mode=frozen,
# adaptation=none, seed=42.
#
# Stage 1 — the frozen-feature backbone tournament (the headline ranking).
jobs:
  - {model: resnet18}
  - {model: dinov2}
  - {model: plantclef}
  - {model: siglip2}
  - {model: aimv2}
  - {model: cradio}
  - {model: dinov3, size: s}
  - {model: dinov3, size: b}
  - {model: dinov3, size: l}
  - {model: dinov3, size: sat}

  # Stage 2 — TTA arm on the frozen winners (U8). Reuses cached features; the un-adapted
  # (adaptation=none) cells already exist above, so resume runs only these adapted cells.
  - {model: [siglip2, aimv2, cradio], adaptation: [adabn, eata, rotta]}
  - {model: dinov3, size: sat, adaptation: [adabn, eata, rotta]}

  # Stage 2-finish — backbone-level cells from the finish plan (2026-06-27-002).
  # All reuse cached features except dinov3_sat7b (extract first) and the lora cell.
  #
  # CORAL domain alignment (origin U6) on the frozen winners — label-free feature recolor.
  - {model: [siglip2, aimv2, cradio, dinov3_sat], adaptation: coral}
  #
  # New TTA siblings (origin U10): SAR (sharpness-aware) + CoTTA (EMA teacher).
  - {model: [siglip2, aimv2, cradio], adaptation: [sar, cotta]}
  - {model: dinov3, size: sat, adaptation: [sar, cotta]}
  #
  # LoRA fine-tune + EATA compounded (origin U10 — the FT path now adapts).
  - {model: aimv2, tuning_mode: lora, adaptation: eata}
  #
  # The un-run 7B satellite backbone (extract features first; see the finish runbook step 1).
  - {model: dinov3, size: sat7b}
  - {model: dinov3, size: sat7b, adaptation: [adabn, eata]}

# Uncomment once its prerequisite is produced:
#
#   # Continued-SSL adapted backbone (origin U7) — needs the SSL checkpoint
#   # (arch_sweep/continued_ssl.py --smoke then the real pretrain) before this resolves.
#   - {model: dinov3_ssl}
#
#   # CLAHE data-variant ablation (needs `data_variants.py --build reference_clahe`)
#   - {model: [siglip2, cradio, aimv2], variant: [reference, reference_clahe]}
#
#   # Cleaned-label re-score (needs the SAM repair + human pass -> tiles_dataset_0422clean/)
#   - {model: [siglip2, aimv2, cradio, dinov3_sat], variant: reference_0422clean}
